<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space For Work | Coworking Space Novi Sad</title>
  <meta name="description" content="Space For Work — coworking u centru Novog Sada. Radna mesta, sale, event prostor, private office i Virtual Office. Fleksibilni paketi i online portal za članove." />
  <meta name="keywords" content="coworking Novi Sad, coworking space Novi Sad, meeting room Novi Sad, event space Novi Sad, private office Novi Sad, virtual office Novi Sad" />
  <meta property="og:title" content="Space For Work | Coworking Space Novi Sad" />
  <meta property="og:description" content="Coworking space Novi Sad za fleksibilan rad, sastanke, evente, privatne kancelarije i poslovnu adresu." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --ink: #171827;
      --ink-soft: #34364a;
      --blue: #1f6689;
      --blue-dark: #144a66;
      --orange: #ff9a42;
      --orange-dark: #de7b21;
      --orange-soft: #fff4eb;
      --green: #0f9f72;
      --green-soft: #eaf8f1;
      --red: #d64141;
      --red-soft: #fff0f0;
      --paper: #ffffff;
      --surface: #f6f7f9;
      --surface-strong: #edf1f4;
      --line: #dfe4e8;
      --muted: #6b7280;
      --shadow: 0 14px 40px rgba(23, 24, 39, 0.12);
      --radius: 8px;
    }

    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--surface);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    img { max-width: 100%; display: block; }

    .site-shell { min-height: 100vh; }
    @keyframes revealUp {
      from { opacity: 0; transform: translateY(22px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes heroDrift {
      from { transform: scale(1.03) translate3d(0, var(--hero-parallax, 0px), 0); }
      to { transform: scale(1.11) translate3d(-1.5%, calc(-1.5% + var(--hero-parallax, 0px)), 0); }
    }
    @keyframes softPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 154, 66, 0.22); }
      50% { box-shadow: 0 0 0 10px rgba(255, 154, 66, 0); }
    }
    @keyframes scrollCue {
      0%, 100% { transform: translateY(0); opacity: 0.72; }
      50% { transform: translateY(7px); opacity: 1; }
    }
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      filter: blur(8px);
      transition: opacity 0.72s cubic-bezier(0.22, 1, 0.36, 1), transform 0.72s cubic-bezier(0.22, 1, 0.36, 1), filter 0.72s ease;
      will-change: opacity, transform, filter;
    }
    .reveal.in-view {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
    .reveal .home-stat,
    .reveal .solution-card,
    .reveal .space-card,
    .reveal .service-card,
    .reveal .gallery-main,
    .reveal .gallery-thumb,
    .reveal .feature-tile,
    .reveal .copy-block,
    .reveal .page-photo,
    .reveal .tour-card,
    .reveal .portal-entry-copy,
    .reveal .auth-panel {
      opacity: 0;
      transform: translateY(26px);
      transition: opacity 0.68s cubic-bezier(0.22, 1, 0.36, 1), transform 0.68s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: opacity, transform;
    }
    .reveal.in-view .home-stat,
    .reveal.in-view .solution-card,
    .reveal.in-view .space-card,
    .reveal.in-view .service-card,
    .reveal.in-view .gallery-main,
    .reveal.in-view .gallery-thumb,
    .reveal.in-view .feature-tile,
    .reveal.in-view .copy-block,
    .reveal.in-view .page-photo,
    .reveal.in-view .tour-card,
    .reveal.in-view .portal-entry-copy,
    .reveal.in-view .auth-panel {
      opacity: 1;
      transform: translateY(0);
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(16px);
      box-shadow: 0 6px 28px rgba(23, 24, 39, 0.06);
      transition: background 0.24s ease, box-shadow 0.24s ease, border-color 0.24s ease;
    }
    .topbar.scrolled {
      background: rgba(255, 255, 255, 0.98);
      border-bottom-color: rgba(23, 24, 39, 0.12);
      box-shadow: 0 12px 34px rgba(23, 24, 39, 0.12);
    }
    .demo-banner {
      background: linear-gradient(90deg, var(--ink) 0%, #2a2d45 100%);
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 9px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .auth-demo-strip {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--orange-soft);
      border: 1px solid rgba(255, 154, 66, 0.28);
      font-size: 12px;
      color: var(--ink-soft);
    }
    .auth-demo-strip .ghost-btn {
      min-height: 34px;
      padding: 0 12px;
      font-size: 12px;
    }
    .section-head p {
      max-width: 58ch;
      color: var(--muted);
    }
    .hero-copy {
      max-width: 46ch;
    }
    .scroll-progress {
      position: absolute;
      left: 0;
      bottom: -1px;
      width: var(--scroll-progress, 0%);
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--orange));
      transform-origin: left center;
      transition: width 0.08s linear;
    }
    .topbar-inner {
      width: min(1180px, calc(100% - 32px));
      height: 68px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 18px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--ink);
      text-decoration: none;
      min-width: 0;
    }
    .brand img {
      width: 124px;
      height: auto;
    }
    .brand-name {
      display: none;
      font-family: Montserrat, sans-serif;
      font-size: 14px;
      font-weight: 800;
    }
    .nav {
      display: flex;
      gap: 6px;
      margin-left: auto;
      align-items: center;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav-btn, .link-btn, .icon-btn {
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink-soft);
      border-radius: var(--radius);
      min-height: 38px;
      padding: 0 12px;
      font-weight: 700;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }
    .nav-btn:hover, .link-btn:hover, .icon-btn:hover {
      background: var(--surface);
      border-color: var(--line);
    }
    .nav-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }
    .primary-btn, .secondary-btn, .danger-btn, .ghost-btn {
      min-height: 42px;
      border-radius: var(--radius);
      padding: 0 16px;
      border: 1px solid transparent;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease, color 0.18s ease;
    }
    .primary-btn {
      background: var(--orange);
      color: #fff;
      box-shadow: 0 10px 24px rgba(255, 154, 66, 0.26);
    }
    .primary-btn:hover { background: var(--orange-dark); }
    .secondary-btn {
      background: var(--ink);
      color: #fff;
    }
    .danger-btn {
      background: var(--red-soft);
      color: var(--red);
      border-color: rgba(214, 65, 65, 0.22);
    }
    .ghost-btn {
      background: #fff;
      color: var(--ink);
      border-color: var(--line);
    }
    .ghost-btn:hover { border-color: var(--orange); color: var(--orange-dark); }
    .primary-btn:hover, .secondary-btn:hover, .ghost-btn:hover, .danger-btn:hover {
      transform: translateY(-1px);
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .hero {
      min-height: calc(100vh - 68px);
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(360px, 440px);
      background: var(--ink);
      color: #fff;
    }
    .hero-media {
      position: relative;
      min-height: 620px;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: var(--ink);
      isolation: isolate;
    }
    .hero-media::before {
      content: "";
      position: absolute;
      inset: -3%;
      z-index: -2;
      background: var(--hero-image, url("https://spaceforwork.rs/wp-content/uploads/2024/04/3S3A2840-min-1170x650.jpg")) center / cover no-repeat;
      animation: heroDrift 16s ease-in-out infinite alternate;
      transition: background-image 0.4s ease;
    }
    .hero-media::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        linear-gradient(90deg, rgba(23, 24, 39, 0.84), rgba(23, 24, 39, 0.36) 52%, rgba(23, 24, 39, 0.18)),
        linear-gradient(0deg, rgba(23, 24, 39, 0.2), transparent 36%);
    }
    .place-hero.hero {
      display: block;
      min-height: calc(100vh - 68px);
      background: var(--ink);
    }
    .place-hero .hero-media {
      min-height: calc(100vh - 68px);
      align-items: stretch;
    }
    .place-hero .hero-media::after {
      background:
        linear-gradient(90deg, rgba(23, 24, 39, 0.9), rgba(23, 24, 39, 0.5) 55%, rgba(23, 24, 39, 0.28)),
        linear-gradient(0deg, rgba(23, 24, 39, 0.78), rgba(23, 24, 39, 0.08) 50%, rgba(23, 24, 39, 0.24));
    }
    .place-hero-inner {
      width: min(1180px, calc(100% - 32px));
      min-height: calc(100vh - 68px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
      align-items: center;
      padding: 74px 0 46px;
    }
    .place-hero .hero-content {
      width: auto;
      max-width: 780px;
      margin: 0;
      padding: 0;
    }
    .hero-kicker-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .hero-kicker-row .tag {
      color: #fff;
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
    }
    .hero-offer-card {
      align-self: end;
      padding: 18px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.26);
      animation: revealUp 0.7s ease 0.1s both;
    }
    .hero-offer-card img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 14px;
    }
    .hero-offer-card h2 {
      margin-bottom: 6px;
      font-family: Montserrat, sans-serif;
      font-size: 24px;
      line-height: 1.05;
    }
    .hero-offer-card p {
      margin-bottom: 16px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
    }
    .hero-scroll-cue {
      margin-top: 34px;
      border: 0;
      background: transparent;
      color: rgba(255, 255, 255, 0.78);
      padding: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }
    .hero-scroll-cue::before {
      content: "";
      width: 1px;
      height: 46px;
      display: inline-block;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), var(--orange));
      animation: scrollCue 1.6s ease-in-out infinite;
    }
    .home-stats-band {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .home-stats-inner {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 1px;
      background: var(--line);
    }
    .home-stat {
      min-height: 132px;
      padding: 24px;
      background: #fff;
      position: relative;
      overflow: hidden;
    }
    .home-stat::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--orange));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.72s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .reveal.in-view .home-stat::after {
      transform: scaleX(1);
    }
    .home-stat strong {
      display: block;
      margin-bottom: 6px;
      font-family: Montserrat, sans-serif;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1;
    }
    .home-stat span {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }
    .hero-content {
      width: min(720px, calc(100% - 48px));
      margin: 0 auto;
      padding: 72px 0 86px;
      animation: revealUp 0.7s ease both;
    }
    .eyebrow {
      color: var(--orange);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 {
      max-width: 640px;
      margin-bottom: 18px;
      font-family: Montserrat, sans-serif;
      font-size: clamp(38px, 6vw, 76px);
      line-height: 0.95;
      letter-spacing: 0;
    }
    .hero-copy {
      max-width: 620px;
      color: rgba(255, 255, 255, 0.84);
      font-size: 17px;
      margin-bottom: 28px;
    }
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(96px, 1fr));
      gap: 12px;
      max-width: 680px;
      margin-top: 38px;
    }
    .stat-tile {
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 86px;
      backdrop-filter: blur(10px);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }
    .stat-tile:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 154, 66, 0.42);
      background: rgba(255, 255, 255, 0.14);
    }
    .stat-value {
      display: block;
      font-family: Montserrat, sans-serif;
      font-size: 24px;
      color: #fff;
      font-weight: 800;
    }
    .stat-label {
      color: rgba(255, 255, 255, 0.76);
      font-size: 12px;
      font-weight: 700;
    }
    .auth-panel-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 34px;
      background: #fff;
      color: var(--ink);
    }
    .auth-panel {
      width: 100%;
      max-width: 390px;
    }
    .auth-panel h2 {
      font-family: Montserrat, sans-serif;
      font-size: 27px;
      line-height: 1.08;
      margin-bottom: 8px;
    }
    .auth-panel p { color: var(--muted); margin-bottom: 22px; }
    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 18px;
    }
    .segmented button {
      border: 0;
      background: transparent;
      border-radius: 6px;
      min-height: 38px;
      font-weight: 800;
      color: var(--muted);
    }
    .segmented button.active {
      background: #fff;
      color: var(--ink);
      box-shadow: 0 4px 14px rgba(23, 24, 39, 0.08);
    }
    .form-grid { display: grid; gap: 14px; }
    .field { display: grid; gap: 6px; }
    .field label {
      font-weight: 800;
      font-size: 12px;
      color: var(--ink-soft);
    }
    .field input, .field select, .field textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 10px 12px;
      outline: none;
    }
    .field textarea {
      min-height: 92px;
      resize: vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 154, 66, 0.16);
    }
    .quick-logins {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .tiny-note {
      color: var(--muted);
      font-size: 12px;
      margin-top: 12px;
    }
    .admin-login-card {
      margin-top: 16px;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(22, 88, 120, 0.2);
      background: #f3f8fa;
    }
    .admin-login-card h3 {
      margin-bottom: 6px;
      font-family: Montserrat, sans-serif;
      font-size: 16px;
      letter-spacing: 0;
    }
    .admin-login-card p {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }
    .admin-login-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .admin-login-meta span {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--blue-dark);
      font-size: 12px;
      font-weight: 800;
    }
    .alert {
      display: none;
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 14px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .alert.show { display: block; }
    .alert.error {
      color: var(--red);
      background: var(--red-soft);
      border-color: rgba(214, 65, 65, 0.24);
    }
    .alert.success {
      color: var(--green);
      background: var(--green-soft);
      border-color: rgba(15, 159, 114, 0.18);
    }

    .section {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }
    .home-statement {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 40px 48px;
      align-items: start;
      padding: 64px 0 34px;
    }
    .home-statement > div {
      text-align: left;
    }
    @media (max-width: 900px) {
      .home-statement {
        grid-template-columns: 1fr;
        gap: 20px;
      }
    }
    .home-statement h2 {
      max-width: 520px;
      font-family: Montserrat, sans-serif;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 0.98;
      letter-spacing: 0;
    }
    .home-statement p {
      max-width: 520px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }
    .solutions-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 14px;
      margin-top: 22px;
    }
    .solution-card {
      position: relative;
      min-height: 216px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      display: grid;
      align-content: end;
      padding: 20px;
      color: var(--ink);
      box-shadow: 0 8px 24px rgba(23, 24, 39, 0.05);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .solution-card:hover {
      transform: translateY(-4px);
      border-color: rgba(255, 154, 66, 0.48);
      box-shadow: var(--shadow);
    }
    .solution-card.featured {
      min-height: 446px;
      color: #fff;
      background: var(--ink);
      isolation: isolate;
      cursor: default;
    }
    .solution-card.featured img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      transition: transform 0.32s ease;
    }
    .solution-card.featured::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background: linear-gradient(180deg, rgba(23, 24, 39, 0.04), rgba(23, 24, 39, 0.84));
    }
    .solution-card.featured:hover img {
      transform: scale(1.05);
    }
    .solution-card h3 {
      margin-bottom: 8px;
      font-family: Montserrat, sans-serif;
      font-size: clamp(23px, 3vw, 36px);
      line-height: 1.02;
    }
    .solution-card p {
      max-width: 520px;
      margin-bottom: 16px;
      color: var(--muted);
      font-size: 14px;
    }
    .solution-card.featured p {
      color: rgba(255, 255, 255, 0.78);
    }

    .booking-legend {

      return JSON.parse(JSON.stringify(seedState));

    function buildPaymentsFromOrders(orders) {
      return (orders || [])

          id: `pay-${order.id}`,
          orderId: order.id,
          userId: order.userId,

          status: "succeeded",

          createdAt: order.paidAt || `${order.createdAt}T10:00:00.000Z`,
          source: "imported_demo_order"
        }));
    }

    function mergeById(seedItems, savedItems) {
      const merged = new Map(seedItems.map((item) => [item.id, { ...item }]));
      savedItems.forEach((item) => {
        merged.set(item.id, { ...(merged.get(item.id) || {}), ...item });
      });
      return Array.from(merged.values());
    }

    const JWT_KEY = "spaceforwork_jwt_v1";

      typeof window === "undefined" ? false : window.__USE_BACKEND__ !== false;
    const API_BASE =
      (typeof window !== "undefined" && window.__API_BASE__) ||
      "http://localhost:3000/api";

    function loadJwtFromStorage() {
      try {
        return localStorage.getItem(JWT_KEY);
      } catch {
        return null;
      }
    }

    let backendJwt = loadJwtFromStorage();

    function saveJwt(token) {
      try {
        if (token) localStorage.setItem(JWT_KEY, token);
        else localStorage.removeItem(JWT_KEY);
      } catch (_) { /* ignore */ }
      backendJwt = token;
    }

    async function apiFetch(path, options = {}) {
      const headers = { ...(options.headers || {}) };
      if (
        options.body &&
        typeof options.body === "string" &&
        !headers["Content-Type"]
      ) {
        headers["Content-Type"] = "application/json";
      }
      if (backendJwt) headers["Authorization"] = `Bearer ${backendJwt}`;
      const res = await fetch(`${API_BASE}${path}`, { ...options, headers });
      const text = await res.text();
      let data = null;
      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }
      if (!res.ok) {
        const msg =
          (data && data.message) ||
          (Array.isArray(data?.message) ? data.message.join(", ") : null) ||
          `HTTP ${res.status}`;
        throw new Error(msg);
      }
      return data;
    }

    function normalizeRole(role) {
      if (!role) return "USER";
      const r = String(role).toLowerCase();
      if (r === "admin" || r === "administrator") return "ADMIN";
      return "USER";
    }

    function mapRoomFromApi(room) {
      return {
        id: room.id,
        name: room.name,
        type: room.type,
        capacity: room.capacity,
        floor: room.type === "phone_booth" ? "open space" : "1. sprat",
        amenities: Array.isArray(room.amenities) ? room.amenities : [],
        isActive: room.isActive !== false,
      };
    }

    function mapBookingFromApi(b) {
      return {
        id: b.id,
        userId: b.userId,
        resourceId: b.roomId,
        date: b.date,
        start: b.startTime,
        end: b.endTime,
        status:
          b.status === "active"
            ? "confirmed"
            : b.status === "cancelled"
              ? "cancelled"
              : "confirmed",
        purpose: "",
        createdAt:
          (b.createdAt && String(b.createdAt).slice(0, 10)) || todayISO(),
      };
    }

    function mapProductToService(p) {
      return {
        id: p.slug,
        productUuid: p.id,
        name: p.name,
        category: p.category,
        price: Number(p.price),
        unit: p.unit,
        featured: Boolean(p.featured),
        short: p.shortDescription || "",
        tags: Array.isArray(p.tags) ? p.tags : [],
      };
    }

    function mapOrderFromApi(o) {
      const line = o.lines && o.lines[0];
      const slug =
        line?.product?.slug || line?.productName || line?.product?.name || "paket";
      return {
        id: o.id,
        userId: o.userId,
        serviceId: slug,
        amount: Number(o.totalAmount),
        status:
          o.status === "paid"
            ? "paid"
            : o.status === "pending"
              ? "pending"
              : o.status,
        createdAt: o.createdAt ? String(o.createdAt).slice(0, 10) : todayISO(),
        paymentRef: o.stripePaymentIntentId || "",
        stripeSessionId: o.stripeSessionId || "",
        cardLast4: o.cardLast4 || "",
        paidAt: o.paidAt || null,
        paymentMode:
          o.stripeSessionId && String(o.stripeSessionId).startsWith("cs_demo")
            ? "test"
            : "stripe",
        lines: o.lines,
      };
    }

    async function refreshCatalogAndRooms() {
      if (!USE_BACKEND) return;
      try {
        const roomsRes = await apiFetch("/rooms?page=1&limit=100");
        const list = roomsRes.data;
        if (Array.isArray(list)) state.resources = list.map(mapRoomFromApi);
      } catch (e) {
        console.warn("Rooms sync:", e);
      }
      try {
        const prodRes = await apiFetch("/commerce/products?page=1&limit=50");
        const rows = prodRes.data || [];
        if (rows.length) state.services = rows.map(mapProductToService);
      } catch (e) {
        console.warn("Products sync:", e);
      }
    }

    async function refreshBookings() {
      if (!USE_BACKEND || !backendJwt) return;
      try {
        const list = await apiFetch("/bookings");
        state.bookings = Array.isArray(list) ? list.map(mapBookingFromApi) : [];
      } catch (e) {
        console.warn("Bookings sync:", e);
      }
    }

    async function refreshOrders() {
      if (!USE_BACKEND || !backendJwt) return;
      try {
        const list = await apiFetch("/commerce/orders/my");
        state.orders = Array.isArray(list) ? list.map(mapOrderFromApi) : [];
        state.payments = buildPaymentsFromOrders(state.orders);
      } catch (e) {
        console.warn("Orders sync:", e);
      }
    }

    async function refreshAdminTransactions() {
      if (!USE_BACKEND || !backendJwt) return;
      const user = currentUser();
      if (!user || user.role !== "ADMIN") return;
      try {
        const res = await apiFetch(
          "/commerce/orders/admin/transactions?page=1&limit=100",
        );
        const rows = res.data || [];
        state.orders = rows.map(mapOrderFromApi);
        state.payments = buildPaymentsFromOrders(
          state.orders.filter((o) => o.status === "paid"),
        );
      } catch (e) {
        console.warn("Admin transactions:", e);
      }
    }

    async function refreshBackendUsersList(opts = {}) {
      const skipRender = Boolean(opts.skipRender);
      if (!USE_BACKEND || !backendJwt) return;
      const user = currentUser();
      if (!user || user.role !== "ADMIN") return;
      try {
        const s = state.filters.adminApiUserSearch?.trim();
        const q = s
          ? `?page=1&limit=100&search=${encodeURIComponent(s)}`
          : "?page=1&limit=100";
        const res = await apiFetch(`/users/admin/list${q}`);
        state.backendApiUsers = Array.isArray(res.data) ? res.data : [];

    /** Kad u localStorage ima JWT ali nema korisnika u state (npr. refresh) — ucitaj profil. */
    async function ensureProfileFromBackend() {
      if (!USE_BACKEND || !backendJwt) return;
      if (currentUser()) return;
      try {
        const profile = await apiFetch("/users/profile");
        const portalUser = {
          id: profile.id,
          name: profile.name,
          email: profile.email,
          role: normalizeRole(profile.role),
          phone: profile.phone || "",
          packageId: null,
          status: profile.isActive === false ? "suspended" : "active",
          createdAt: (profile.createdAt || "").slice(0, 10) || todayISO(),
          password: "",
        };
        const ix = state.users.findIndex((x) => x.id === portalUser.id);
        if (ix >= 0) state.users[ix] = portalUser;
        else state.users.push(portalUser);
        state.sessionUserId = portalUser.id;
        state.showPublic = false;
      } catch (e) {
        console.warn("Sesija (profil):", e);
        const msg = String(e.message || "");
        if (msg.includes("401")) {
          saveJwt(null);
          backendJwt = null;
          state.sessionUserId = null;
        }
      }
    }

    async function mergeRoomAvailabilityIntoState(roomId, date) {
      if (!USE_BACKEND || !roomId || !date) return;
      try {
        const res = await fetch(
          `${API_BASE}/bookings/room/${encodeURIComponent(roomId)}?date=${encodeURIComponent(date)}`,
        );
        const text = await res.text();
        const list = text ? JSON.parse(text) : [];
        const mapped = Array.isArray(list) ? list.map(mapBookingFromApi) : [];
        const others = state.bookings.filter(
          (b) => !(b.resourceId === roomId && b.date === date),
        );
        state.bookings = [...others, ...mapped];
      } catch (e) {
        console.warn("Room availability:", e);
      }
    }

    function formatEur(value) {
      return `${Number(value).toLocaleString("sr-RS")} €`;
    }

    function scrollTopInstant() {
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function todayISO() {
      return new Date().toISOString().slice(0, 10);
    }

    function addDaysISO(days) {
      const date = new Date();
      date.setDate(date.getDate() + days);
      return date.toISOString().slice(0, 10);
    }

    function initials(name) {
      return String(name || "SF")
        .split(" ")
        .filter(Boolean)
        .slice(0, 2)
        .map((part) => part[0])
        .join("")
        .toUpperCase();
    }

    function serviceById(id) {
      return state.services.find((service) => service.id === id);
    }

    function resourceById(id) {
      return state.resources.find((resource) => resource.id === id);
    }

    function userById(id) {
      return state.users.find((user) => user.id === id);
    }

    function timeToMinutes(time) {
      const [hours, minutes] = String(time || "00:00").split(":").map(Number);
      return hours * 60 + minutes;
    }

    function overlaps(aStart, aEnd, bStart, bEnd) {
      return timeToMinutes(aStart) < timeToMinutes(bEnd) && timeToMinutes(aEnd) > timeToMinutes(bStart);
    }

    function renderCalendarPreview(resourceId, date) {
      const ranges = [
        ["09:00", "10:00"],
        ["10:00", "11:00"],
        ["11:00", "12:00"],
        ["12:00", "13:00"],
        ["13:00", "14:00"],
        ["14:00", "15:00"]
      ];
      return ranges.map(([start, end]) => {
        const busy = state.bookings.some((booking) =>
          booking.resourceId === resourceId &&
          booking.date === date &&
          booking.status !== "cancelled" &&
          overlaps(booking.start, booking.end, start, end)
        );
        return `
          <div class="slot-row">
            <span class="slot-time">${start}</span>
            <div class="slot-bar"><div class="slot-fill ${busy ? "busy" : ""}" style="width:${busy ? "100" : "24"}%;"></div></div>
          </div>
        `;
      }).join("");
    }

    function renderPublicBookingCalendar(resourceId, date) {
      if (!resourceId) return `<div class="empty">Izaberi prostor da vidis slobodne termine.</div>`;
      const rows = [];
      for (let hour = 8; hour < 18; hour += 1) {
        const hourLabel = `${String(hour).padStart(2, "0")}:00`;
        const firstStart = `${String(hour).padStart(2, "0")}:00`;
        const firstEnd = `${String(hour).padStart(2, "0")}:30`;
        const secondStart = `${String(hour).padStart(2, "0")}:30`;
        const secondEnd = `${String(hour + 1).padStart(2, "0")}:00`;
        rows.push(`
          <div class="public-slot-row">
            <span class="public-slot-hour">${hourLabel}</span>
            ${renderPublicSlotCell(resourceId, date, firstStart, firstEnd)}
            ${renderPublicSlotCell(resourceId, date, secondStart, secondEnd)}
          </div>
        `);
      }
      return `
        <div class="public-calendar-cols">
          <span>Sat</span>
          <span>XX:00</span>
          <span>XX:30</span>
        </div>
        ${rows.join("")}
      `;
    }

    function renderPublicSlotCell(resourceId, date, start, end) {
      const booking = state.bookings.find((item) =>
        item.resourceId === resourceId &&
        item.date === date &&
        item.status !== "cancelled" &&
        overlaps(item.start, item.end, start, end)
      );
      const busy = Boolean(booking);
      const mine = busy && currentUser()?.id && booking.userId === currentUser().id;
      const label = busy
        ? `${mine ? "Tvoj termin" : "Zauzeto"}${booking?.purpose ? ` | ${booking.purpose}` : ""}`
        : "Slobodno";
      return `
        <div class="public-slot ${busy ? (mine ? "mine" : "busy") : "free"}">
          <button class="public-slot-button" type="button" ${busy ? "disabled" : `onclick="prefillPublicBooking('${start}', '${end}')"`}>
            <span>${escapeHtml(label)}</span>
            <small>${start}-${end}</small>
          </button>
        </div>
      `;
    }

    function resourceLabel(resource) {
      const labels = {
        meeting_room: "Sala za sastanke",
        phone_booth: "Phone booth",
        event_space: "Event prostor"
      };
      return labels[resource?.type] || "Prostor";
    }

    function resourceShortCode(resource) {
      const codes = {
        meeting_room: "MR",
        phone_booth: "PB",
        event_space: "EV"
      };
      return codes[resource?.type] || "SP";
    }

    function renderShopView() {
      return `

            <div>
              <h2>Izaberi sledeci paket ili uslugu</h2>
              <p>Kupovina se odmah belezi u porudzbinama. U sledecoj fazi isti tok se povezuje sa Stripe placanjem, pa se status placanja azurira automatski.</p>
            </div>
          </div>
          <div class="pricing-grid">${state.services.map(renderServiceCard).join("")}</div>
        </section>
      `;

        <section class="table-panel">

            <div>
              <h2>Moje porudzbine</h2>

          </div>
          ${renderOrderTable(state.orders.filter((order) => order.userId === user.id), "member")}

      `;

    function renderVirtualOfficeView() {

        <div class="layout-grid">
          <section class="panel">

              <div>
                <h2>Posalji Virtual Office zahtev</h2>

    function renderAdmin() {
      const user = currentUser();
      const view = state.view || "admin-overview";
      return `
        ${renderTopbar("admin")}
        <main class="dashboard">
          <div class="dashboard-head">
            <div class="dashboard-title">
              <span class="eyebrow">Kontrolna tabla</span>
              <h1>Pregled prostora, clanova, rezervacija i placanja</h1>
              <p>Rezervacije, korisnici (ukljucujuci REST liste), sobe, porudzbine, VO zahtevi i uvezena baza — na jednom mestu.</p>

          ${renderAdminView(view)}

    function adminTabs(activeView) {
      const tabs = [
        ["admin-overview", "Dashboard"],
        ["admin-bookings", "Rezervacije"],
        ["admin-resources", "Resursi"],
        ["admin-users", "Korisnici"],
        ["admin-api-users", "Nalozi (REST)"],
        ["admin-api-rooms", "Sobe (REST)"],
        ["admin-orders", "Placanja"],
        ["admin-catalog", "Katalog"],
        ["admin-vo", "Virtual Office"],
        ["admin-database", "Baza"]
      ];
      return tabs.map(([id, label]) => `<button class="nav-btn ${activeView === id ? "active" : ""}" type="button" onclick="setView('${id}')">${label}</button>`).join("");
    }

    function renderAdminView(view) {
      if (view === "admin-bookings") return renderAdminBookings();
      if (view === "admin-resources") return renderAdminResources();
      if (view === "admin-users") return renderAdminUsers();
      if (view === "admin-api-users") return renderAdminApiUsers();
      if (view === "admin-api-rooms") return renderAdminApiRooms();
      if (view === "admin-orders") return renderAdminOrders();
      if (view === "admin-catalog") return renderAdminCatalog();
      if (view === "admin-vo") return renderAdminVirtualOffice();
      if (view === "admin-database") return renderAdminDatabase();
      return renderAdminOverview();
    }

    function bookingOwnerName(booking) {
      const user = userById(booking.userId);
      return user?.name || booking.guestName || "Gost / lead";
    }

    function bookingOwnerContact(booking) {
      const user = userById(booking.userId);
      return [booking.guestEmail || user?.email, booking.guestPhone || user?.phone].filter(Boolean).join(" | ");
    }

    function bookingSortStamp(booking) {
      const stamp = new Date(`${booking.date}T${booking.start || "00:00"}`).getTime();
      return Number.isFinite(stamp) ? stamp : 0;
    }

    function sortedBookings(bookings) {
      return [...bookings].sort((a, b) => bookingSortStamp(a) - bookingSortStamp(b));
    }

    function upcomingActiveBookings() {
      const today = todayISO();
      return sortedBookings(state.bookings.filter((booking) => booking.status !== "cancelled" && booking.date >= today));
    }

    function adminNumbers() {
      const data = officeData();
      const summary = data.summary || {};
      const activeBookings = state.bookings.filter((booking) => booking.status !== "cancelled");
      const pendingBookings = state.bookings.filter((booking) => booking.status === "pending");
      const paidRevenue = state.orders.filter((order) => order.status === "paid").reduce((sum, order) => sum + order.amount, 0);
      const pendingOrders = state.orders.filter((order) => order.status === "pending");
      const activeUsers = state.users.filter((user) => user.role === "USER" && user.status === "active");
      return {
        activeBookings: activeBookings.length,
        pendingBookings: pendingBookings.length,
        paidRevenue,
        pendingOrders: pendingOrders.length,
        portalUsers: activeUsers.length,
        importedMembers: summary.activeListMembers || 0,
        registeredMembers: summary.registeredMembers || 0,
        virtualOfficeActive: summary.virtualOfficeActive || state.voRequests.filter((request) => request.status === "active").length,
        privateOfficeSeats: summary.privateOfficeSeats || 0,
        privateOfficeRevenue: summary.privateOfficeMonthlyRevenue || 0
      };
    }

    function renderAdminOverview() {
      const numbers = adminNumbers();
      const pendingBookings = sortedBookings(state.bookings.filter((booking) => booking.status === "pending"));
      const upcomingBookings = upcomingActiveBookings().slice(0, 6);
      return `
        <section class="admin-command">
          <div>
            <span class="eyebrow">Pregled dana</span>
            <h2>Sve sto recepcija treba na prvi pogled.</h2>
            <p>Rezervacije, placanja, clanovi, VO i uvezena baza — bez skakanja po tabovima u Excelu.</p>
            <div class="admin-command-actions">
              <button class="primary-btn" type="button" onclick="setView('admin-bookings')">Obradi rezervacije</button>
              <button class="secondary-btn" type="button" onclick="setView('admin-resources')">Pogledaj resurse</button>
              <button class="ghost-btn" type="button" onclick="setView('admin-database')">Otvori bazu</button>
            </div>
          </div>
          <div class="admin-command-stats">
            <div class="admin-chip"><span>Na cekanju</span><strong>${numbers.pendingBookings}</strong></div>
            <div class="admin-chip"><span>VO aktivno</span><strong>${numbers.virtualOfficeActive}</strong></div>
            <div class="admin-chip"><span>Private seats</span><strong>${numbers.privateOfficeSeats}</strong></div>
          </div>
        </section>
        <div class="metric-grid">
          <div class="metric"><span class="metric-label">Aktivne rezervacije</span><span class="metric-value">${numbers.activeBookings}</span><small>sale, booth i event termini koji nisu otkazani</small></div>
          <div class="metric"><span class="metric-label">Portal korisnici</span><span class="metric-value">${numbers.portalUsers}</span><small>${numbers.importedMembers} aktivnih clanova u uvezenoj bazi</small></div>
          <div class="metric"><span class="metric-label">Placeno</span><span class="metric-value">${formatEur(numbers.paidRevenue)}</span><small>demo placanja u portalu, plus ${formatEur(numbers.privateOfficeRevenue)} private office mesecno</small></div>
          <div class="metric"><span class="metric-label">Za obradu</span><span class="metric-value">${numbers.pendingOrders + numbers.pendingBookings}</span><small>rezervacije i porudzbine koje traze admin odluku</small></div>
        </div>
        <section class="panel" style="margin-bottom:16px;">
          <div class="panel-head">
            <div>
              <h2>Brze admin akcije</h2>
              <p>Brzi skokovi u najcesce sekcije.</p>
            </div>
          </div>
          <div class="admin-action-grid">
            <article class="admin-action-card"><strong>Rezervacije</strong><p>Potvrdi termine, otkazi duplikate i proveri kontakt lead-a.</p><button class="mini-btn" type="button" onclick="setView('admin-bookings')">Otvori</button></article>
            <article class="admin-action-card"><strong>Korisnici</strong><p>Pregledaj clanove portala, pakete i status naloga.</p><button class="mini-btn" type="button" onclick="setView('admin-users')">Otvori</button></article>
            <article class="admin-action-card"><strong>Placanja</strong><p>Oznaci pending porudzbine kao placene i prati reference.</p><button class="mini-btn" type="button" onclick="setView('admin-orders')">Otvori</button></article>
            <article class="admin-action-card"><strong>Virtual Office</strong><p>Prebaci zahtev kroz ugovor, aktivaciju i administraciju.</p><button class="mini-btn" type="button" onclick="setView('admin-vo')">Otvori</button></article>
          </div>
        </section>
        <div class="admin-work-grid">
          <section class="table-panel">
            <div class="table-toolbar">
              <div>
                <h2>Rezervacije za odluku</h2>
                <p style="margin:0;color:var(--muted);">Svi zahtevi poslati sa javne booking stranice dolaze ovde kao pending.</p>
              </div>
            </div>
            ${renderAdminQueue(pendingBookings)}
          </section>
          <aside class="panel">
            <h2>Operativni signal</h2>
            ${renderAdminFeed()}
          </aside>
        </div>
        <div class="admin-work-grid">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h2>Resursi i zauzetost</h2>
                <p>Brzi pregled sala, booth-ova i event prostora prema najblizim aktivnim terminima.</p>
              </div>
              <button class="ghost-btn" type="button" onclick="setView('admin-resources')">Svi resursi</button>
            </div>
            ${renderAdminResourceCards(4)}
          </section>
          <section class="table-panel">
            <div class="table-toolbar">
              <div>
                <h2>Najblizi aktivni termini</h2>
                <p style="margin:0;color:var(--muted);">Ko dolazi, koji resurs koristi i kada pocinje sledeci termin.</p>
              </div>
            </div>
            ${renderBookingTable(upcomingBookings, "admin")}
          </section>
        </div>
      `;
    }

    function renderAdminQueue(bookings) {
      if (!bookings.length) return `<div class="empty">Nema pending rezervacija. Kada neko posalje javni zahtev, pojavi se ovde sa akcijama za potvrdu ili otkazivanje.</div>`;
      return `
        <div class="admin-queue">
          ${bookings.map((booking) => {
            const resource = resourceById(booking.resourceId);
            const contact = bookingOwnerContact(booking);
            return `
              <article class="queue-card">
                <div>
                  <strong>${escapeHtml(resource?.name || "Resurs")} | ${escapeHtml(booking.date)} ${escapeHtml(booking.start)}-${escapeHtml(booking.end)}</strong>
                  <span>${escapeHtml(bookingOwnerName(booking))}${contact ? ` | ${escapeHtml(contact)}` : ""}</span>
                  <span>${escapeHtml(booking.purpose || "Rezervacija prostora")}</span>
                </div>
                <div class="table-actions">
                  <button class="mini-btn" type="button" onclick="confirmBooking('${booking.id}')">Potvrdi</button>
                  <button class="mini-btn" type="button" onclick="cancelBooking('${booking.id}')">Otkazi</button>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderAdminFeed() {
      const numbers = adminNumbers();
      const data = officeData();
      const summary = data.summary || {};
      const items = [
        ["Uvezena baza", `${numbers.registeredMembers} registracija, ${numbers.importedMembers} aktivnih clanova iz Excel fajla.`],
        ["Virtual Office", `${numbers.virtualOfficeActive} aktivnih zapisa, ${summary.virtualOfficeWanted || 0} potencijalnih lead-ova.`],
        ["Private Office", `${numbers.privateOfficeSeats} mesta i ${formatEur(numbers.privateOfficeRevenue)} procenjenog mesecnog prihoda.`],
        ["Placanja", `${numbers.pendingOrders} porudzbina ceka proveru placanja u demo toku.`]
      ];
      return `<div class="admin-feed-grid">${items.map(([title, text]) => `<div class="admin-feed-card"><strong>${escapeHtml(title)}</strong><span>${escapeHtml(text)}</span></div>`).join("")}</div>`;
    }

    function renderAdminResourceCards(limit = state.resources.length) {
      const upcoming = upcomingActiveBookings();
      return `
        <div class="admin-resource-grid">
          ${state.resources.slice(0, limit).map((resource) => {
            const resourceBookings = upcoming.filter((booking) => booking.resourceId === resource.id);
            const pending = resourceBookings.filter((booking) => booking.status === "pending").length;
            const confirmed = resourceBookings.filter((booking) => booking.status === "confirmed").length;
            const next = resourceBookings[0];
            const load = Math.min(100, Math.max(12, resourceBookings.length * 18));
            return `
              <article class="admin-resource-card">
                <header>
                  <div>
                    <h3>${escapeHtml(resource.name)}</h3>
                    <p>${escapeHtml(resourceLabel(resource))} | ${resource.capacity} ${resource.capacity === 1 ? "osoba" : "osoba"} | ${escapeHtml(resource.floor)}</p>
                  </div>
                  <span class="tag">${escapeHtml(resourceShortCode(resource))}</span>
                </header>
                <div class="resource-meter"><span style="width:${load}%;"></span></div>
                <div class="resource-stat-row"><span>Potvrdjeno</span><strong>${confirmed}</strong></div>
                <div class="resource-stat-row"><span>Na cekanju</span><strong>${pending}</strong></div>
                <div class="resource-stat-row"><span>Sledece</span><strong>${next ? `${escapeHtml(next.date)} ${escapeHtml(next.start)}` : "slobodno"}</strong></div>
                <div class="table-actions" style="margin-top:12px;">
                  <button class="mini-btn" type="button" onclick="focusAdminResource('${resource.id}')">Termini</button>
                </div>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderAdminBookings() {
      const search = state.filters.adminBookingSearch.toLowerCase();
      const status = state.filters.adminBookingStatus;
      const filtered = sortedBookings(state.bookings.filter((booking) => {
        const resource = resourceById(booking.resourceId)?.name || "";
        const user = userById(booking.userId)?.name || "";
        const contact = bookingOwnerContact(booking);
        const matchesSearch = `${resource} ${user} ${booking.guestName || ""} ${contact} ${booking.date} ${booking.purpose}`.toLowerCase().includes(search);
        const matchesStatus = status === "all" || booking.status === status;
        return matchesSearch && matchesStatus;
      }));
      return `
        <section class="table-panel">
          <div class="table-toolbar">
            <div class="field">
              <label for="admin-booking-search">Pretraga</label>
              <input id="admin-booking-search" value="${escapeHtml(state.filters.adminBookingSearch)}" placeholder="Korisnik, gost, sala, email, datum" />
            </div>
            <div class="field">
              <label for="admin-booking-status">Status</label>
              <select id="admin-booking-status">
                ${["all", "confirmed", "pending", "cancelled"].map((item) => `<option value="${item}" ${status === item ? "selected" : ""}>${item === "all" ? "Svi statusi" : statusLabel(item)}</option>`).join("")}
              </select>
            </div>
          </div>
          ${renderBookingTable(filtered, "admin")}
        </section>
      `;
    }

    function renderAdminResources() {
      const meetingRooms = state.resources.filter((resource) => resource.type === "meeting_room").length;
      const booths = state.resources.filter((resource) => resource.type === "phone_booth").length;
      const eventCapacity = state.resources.filter((resource) => resource.type === "event_space").reduce((sum, resource) => sum + resource.capacity, 0);
      const upcoming = upcomingActiveBookings();
      return `
        <div class="metric-grid">
          <div class="metric"><span class="metric-label">Ukupno resursa</span><span class="metric-value">${state.resources.length}</span><small>sale, booth-ovi i event prostor u sistemu</small></div>
          <div class="metric"><span class="metric-label">Meeting room</span><span class="metric-value">${meetingRooms}</span><small>prostori za klijente, timove i radionice</small></div>
          <div class="metric"><span class="metric-label">Phone booth</span><span class="metric-value">${booths}</span><small>prostori za online pozive i fokus razgovore</small></div>
          <div class="metric"><span class="metric-label">Event kapacitet</span><span class="metric-value">${eventCapacity}</span><small>maksimalan broj ljudi za event setup</small></div>
        </div>
        <section class="panel" style="margin-bottom:16px;">
          <div class="panel-head">
            <div>
              <span class="eyebrow">Resursi</span>
              <h2>Kontrola zauzetosti i kapaciteta prostora</h2>
              <p>Admin moze da vidi koji resursi su najvise optereceni, koji termini cekaju potvrdu i gde treba brzo reagovati.</p>
            </div>
          </div>
          ${renderAdminResourceCards()}
        </section>
        <section class="table-panel">
          <div class="table-toolbar">
            <div>
              <h2>Detaljan inventar resursa</h2>
              <p style="margin:0;color:var(--muted);">Ovo je model koji kasnije postaje backend tabela resources.</p>
            </div>
          </div>
          <div class="data-table-wrap">
            <table>
              <thead><tr><th>Resurs</th><th>Tip</th><th>Kapacitet</th><th>Sprat / zona</th><th>Oprema</th><th>Najblizi termin</th><th>Akcije</th></tr></thead>
              <tbody>
                ${state.resources.map((resource) => {
                  const next = upcoming.find((booking) => booking.resourceId === resource.id);
                  return `
                    <tr>
                      <td><strong>${escapeHtml(resource.name)}</strong></td>
                      <td>${escapeHtml(resourceLabel(resource))}</td>
                      <td>${resource.capacity}</td>
                      <td>${escapeHtml(resource.floor)}</td>
                      <td>${escapeHtml((resource.amenities || []).join(" / "))}</td>
                      <td>${next ? `${escapeHtml(next.date)} ${escapeHtml(next.start)}-${escapeHtml(next.end)}` : "Nema aktivnih termina"}</td>
                      <td><button class="mini-btn" type="button" onclick="focusAdminResource('${resource.id}')">Filtriraj termine</button></td>
                    </tr>
                  `;
                }).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderAdminUsers() {
      const search = state.filters.adminUserSearch.toLowerCase();
      const users = state.users.filter((user) =>
        `${user.name} ${user.email} ${user.role} ${user.phone}`.toLowerCase().includes(search)
      );
      return `
        <section class="table-panel">
          <div class="table-toolbar">

          <div class="data-table-wrap">

                ${users.map((user) => `
                  <tr>
                    <td><strong>${escapeHtml(user.name)}</strong><br><span style="color:var(--muted);">${escapeHtml(user.phone || "-")}</span></td>
                    <td>${escapeHtml(user.email)}</td>
                    <td><span class="tag">${escapeHtml(user.role)}</span></td>
                    <td>${escapeHtml(serviceById(user.packageId)?.name || "-")}</td>
                    <td><span class="status ${user.status}">${escapeHtml(statusLabel(user.status))}</span></td>
                    <td><div class="table-actions">
                      ${user.role === "USER" ? `<button class="mini-btn" type="button" onclick="toggleUserStatus('${user.id}')">${user.status === "active" ? "Suspenduj" : "Aktiviraj"}</button>` : ""}

                  </tr>
                `).join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;
    }

    function renderAdminApiUsers() {
      const rows = state.backendApiUsers || [];
      const searchVal = state.filters.adminApiUserSearch || "";
      return `
        <section class="table-panel">
          <div class="table-toolbar">
            <div>
              <h2>Korisnici preko REST API-ja</h2>
              <p style="margin:0;color:var(--muted);">GET /api/users/admin/list, PATCH i DELETE /api/users/admin/:id — podaci iz user-service baze (JWT admin).</p>
            </div>
            <div class="field" style="display:flex;flex-wrap:wrap;gap:0.75rem;align-items:flex-end;">
              <div>
                <label for="admin-api-user-search">Pretraga (ime, email, uloga)</label>
                <input id="admin-api-user-search" value="${escapeHtml(searchVal)}" placeholder="npr. admin@" />
              </div>
              <button class="secondary-btn" type="button" id="admin-api-user-refresh">Osveži listu</button>
            </div>
          </div>
          <div class="data-table-wrap">
            <table>
              <thead><tr><th>Ime</th><th>Email</th><th>Uloga</th><th>Aktivan</th><th>Akcije</th></tr></thead>
              <tbody>

    function renderInsightRows(title, rows = []) {

    function renderBookingsList(bookings) {
      if (!bookings.length) return `<div class="empty">Trenutno nema aktivnih rezervacija. Kada zakazes salu ili booth, termin ce se pojaviti ovde.</div>`;
      return `

            return `
              <div class="list-item">
                <div>

                <span class="status ${booking.status}">${escapeHtml(statusLabel(booking.status))}</span>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderBookingTable(bookings, mode) {
      if (!bookings.length) return `<div class="empty">Nema podataka za izabrane filtere.</div>`;
      return `
        <div class="data-table-wrap">
          <table>
            <thead><tr><th>Resurs</th><th>Korisnik</th><th>Datum</th><th>Termin</th><th>Status</th><th>Akcije</th></tr></thead>
            <tbody>
              ${bookings.map((booking) => {
                const resource = resourceById(booking.resourceId);
                const user = userById(booking.userId);
                const bookingUser = user?.name || booking.guestName || "-";
                const bookingContact = booking.guestEmail || booking.guestPhone
                  ? `<br><span style="color:var(--muted);">${escapeHtml([booking.guestEmail, booking.guestPhone].filter(Boolean).join(" | "))}</span>`
                  : "";
                return `
                  <tr>
                    <td><strong>${escapeHtml(resource?.name || "Resurs")}</strong><br><span style="color:var(--muted);">${escapeHtml(booking.purpose || "-")}</span></td>
                    <td>${escapeHtml(bookingUser)}${bookingContact}</td>
                    <td>${escapeHtml(booking.date)}</td>
                    <td>${escapeHtml(booking.start)}-${escapeHtml(booking.end)}</td>
                    <td><span class="status ${booking.status}">${escapeHtml(statusLabel(booking.status))}</span></td>

                      ${booking.status !== "cancelled" ? `<button class="mini-btn" type="button" onclick="cancelBooking('${booking.id}')">Otkazi</button>` : ""}

                    </div></td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function paymentByOrderId(orderId) {
      return (state.payments || []).find((payment) => payment.orderId === orderId);

      const payment = paymentByOrderId(order.id);
      const reference = payment?.reference || order.paymentRef || "cs_test_pending";

      const created = payment?.createdAt || order.paidAt;
      if (order.status === "paid") {
        return `
          <div class="payment-ref">
            <strong>${escapeHtml(reference)}</strong>
            <small>Stripe test${card ? ` | kartica **** ${escapeHtml(card)}` : ""}</small>
            <small>${created ? escapeHtml(new Date(created).toLocaleString("sr-RS")) : "placeno u test modu"}</small>
          </div>
        `;
      }
      return `
        <div class="payment-ref">
          <strong>${escapeHtml(order.stripeSessionId || reference)}</strong>
          <small>Stripe test checkout ceka potvrdu</small>
          <small>Bez stvarne naplate</small>
        </div>
      `;
    }

    async function login(email, password) {
      if (USE_BACKEND) {
        saveJwt(null);
        backendJwt = null;
        try {
          const data = await apiFetch("/users/login", {
            method: "POST",
            body: JSON.stringify({ email, password }),
          });
          saveJwt(data.access_token);
          const u = data.user;
          const portalUser = {
            id: u.id,
            name: u.name,
            email: u.email,
            role: normalizeRole(u.role),
            phone: "",
            packageId: null,
            status: "active",
            createdAt: todayISO(),
            password: "",
          };
          const ix = state.users.findIndex((x) => x.id === u.id);
          if (ix >= 0) state.users[ix] = portalUser;
          else state.users.push(portalUser);
          state.sessionUserId = u.id;
          state.view =
            normalizeRole(u.role) === "ADMIN" ? "admin-overview" : "overview";
          state.showPublic = false;
          state.showAuthModal = false;
          await syncAfterLogin();
          saveState();
          render();
          scrollTopInstant();
        } catch (err) {
          const raw = String(err.message || "");
          const friendly =
            /neispravan email ili lozinka/i.test(raw) ||
            /invalid email or password/i.test(raw) ||
            /401/.test(raw)
              ? "Email ili lozinka nisu ispravni. Proveri podatke i da li je API (Docker) pokrenut."
              : raw || "Prijava nije uspela.";
          showAlert("auth-alert", "error", friendly);
        }
        return;
      }
      const user = state.users.find(
        (item) =>
          item.email.toLowerCase() === email && item.password === password,
      );
      if (!user) {
        showAlert(
          "auth-alert",
          "error",
          "Email ili lozinka nisu ispravni. Proverite podatke ili koristite demo nalog.",
        );
        return;
      }
      if (user.status !== "active") {
        showAlert(
          "auth-alert",
          "error",
          "Nalog je trenutno suspendovan. Kontaktirajte administratora za ponovno aktiviranje.",
        );
        return;
      }
      state.sessionUserId = user.id;
      state.view = user.role === "ADMIN" ? "admin-overview" : "overview";
      state.showPublic = false;
      state.showAuthModal = false;
      saveState();
      render();
      scrollTopInstant();
    }

    function activateRevealAnimations() {
      const items = document.querySelectorAll(".reveal");
      if (!items.length) return;
      prepareStaggerAnimations();
      if (!("IntersectionObserver" in window)) {
        items.forEach((item) => {
          item.classList.add("in-view");
          animateCountersWithin(item);
          clearStaggerDelays(item);
        });
        return;
      }
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("in-view");
            animateCountersWithin(entry.target);
            clearStaggerDelays(entry.target);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.16 });
      items.forEach((item) => observer.observe(item));
    }

    function staggerSelector() {
      return [
        ".home-stat",
        ".solution-card",
        ".space-card",
        ".service-card",
        ".gallery-main",
        ".gallery-thumb",
        ".feature-tile",
        ".copy-block",
        ".page-photo",
        ".tour-card",
        ".portal-entry-copy",
        ".auth-panel"
      ].join(",");
    }

    function prepareStaggerAnimations() {
      const selector = staggerSelector();
      document.querySelectorAll(".reveal").forEach((section) => {
        section.querySelectorAll(selector).forEach((child, index) => {
          child.style.transitionDelay = `${Math.min(index * 70, 420)}ms`;
        });
      });
    }

    function clearStaggerDelays(container) {
      window.setTimeout(() => {
        container.querySelectorAll(staggerSelector()).forEach((child) => {
          child.style.transitionDelay = "";
        });
      }, 1000);
    }

    function animateCountersWithin(container) {
      const counters = container.querySelectorAll("[data-count]");
      counters.forEach((counter) => {
        if (counter.dataset.animated === "true") return;
        counter.dataset.animated = "true";
        const target = Number(counter.dataset.count || 0);
        const suffix = counter.dataset.suffix || "";
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (prefersReduced) {
          counter.textContent = `${target}${suffix}`;
          return;
        }
        const start = performance.now();
        const duration = 1100;
        const update = (now) => {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          counter.textContent = `${Math.round(target * eased)}${suffix}`;
          if (progress < 1) requestAnimationFrame(update);
        };
        requestAnimationFrame(update);
      });
    }

    function syncScrollEffects() {
      if (scrollEffectsBound) {
        handleScrollEffects();
        return;
      }
      scrollEffectsBound = true;
      window.addEventListener("scroll", handleScrollEffects, { passive: true });
      window.addEventListener("resize", handleScrollEffects);
      handleScrollEffects();
    }

    function handleScrollEffects() {
      if (scrollTicking) return;
      scrollTicking = true;
      requestAnimationFrame(() => {
        const maxScroll = Math.max(document.documentElement.scrollHeight - window.innerHeight, 1);
        const progress = Math.min(Math.max(window.scrollY / maxScroll, 0), 1);
        document.querySelectorAll(".topbar").forEach((bar) => {
          bar.classList.toggle("scrolled", window.scrollY > 12);
          bar.style.setProperty("--scroll-progress", `${Math.round(progress * 10000) / 100}%`);
        });
        const hero = document.querySelector(".place-hero .hero-media");
        if (hero && !window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          const shift = Math.min(window.scrollY * 0.08, 42);
          hero.style.setProperty("--hero-parallax", `${shift}px`);
        }
        scrollTicking = false;
      });
    }

    function startHeroRotation() {
      clearInterval(heroTimer);
      const hero = document.querySelector(".hero-media");
      if (!hero) return;
      hero.style.setProperty("--hero-image", `url("${heroImages[heroIndex]}")`);
      heroTimer = setInterval(() => {
        heroIndex = (heroIndex + 1) % heroImages.length;
        hero.style.setProperty("--hero-image", `url("${heroImages[heroIndex]}")`);
      }, 5200);
    }
