    function submitPublicBooking() {
      const user = currentUser();
      const date = document.getElementById("public-booking-date").value;
      const start = document.getElementById("public-booking-start").value;
      const end = document.getElementById("public-booking-end").value;
      const guestName = document.getElementById("public-booking-name").value.trim();
      const guestEmail = document.getElementById("public-booking-email").value.trim();
      const guestPhone = document.getElementById("public-booking-phone").value.trim();
      const purpose = document.getElementById("public-booking-purpose").value.trim() || "Rezervacija prostora";
      const resourceId = state.selectedResourceId;

      if (!resourceId || !date || !start || !end || !guestName || !guestEmail) {
        showAlert("public-booking-alert", "error", "Izaberi prostor, datum, vreme i unesi ime i email.");
        return;
      }
      if (USE_BACKEND && !user) {
        showAlert(
          "public-booking-alert",
          "error",
          "Za online rezervaciju uloguj se (gore desno: Prijava).",
        );
        focusLogin();
        return;
      }
      if (timeToMinutes(end) <= timeToMinutes(start)) {
        showAlert("public-booking-alert", "error", "Kraj termina mora biti kasnije od pocetka.");
        return;
      }
      if ((timeToMinutes(end) - timeToMinutes(start)) < 30 || timeToMinutes(start) % 30 !== 0 || timeToMinutes(end) % 30 !== 0) {
        showAlert("public-booking-alert", "error", "Termin mora trajati najmanje 30 minuta i mora biti u koracima od 30 minuta.");
        return;
      }

      if (USE_BACKEND && user) {
        (async () => {
          try {
            await mergeRoomAvailabilityIntoState(resourceId, date);
            const resourceConflict = state.bookings.some((booking) =>
              booking.resourceId === resourceId &&
              booking.date === date &&
              booking.status !== "cancelled" &&
              overlaps(booking.start, booking.end, start, end)
            );
            if (resourceConflict) {
              showAlert(
                "public-booking-alert",
                "error",
                "Izabrani termin je vec zauzet. Klikni slobodan termin u pregledu ili izaberi drugo vreme.",
              );
              return;
            }
            await apiFetch("/bookings", {
              method: "POST",
              body: JSON.stringify({
                roomId: resourceId,
                date,
                startTime: start,
                endTime: end,
              }),
            });
            await refreshBookings();
            state.publicBookingDate = date;
            saveState();
            const calendar = document.getElementById("public-booking-calendar");
            if (calendar)
              calendar.innerHTML = renderPublicBookingCalendar(resourceId, date);
            document.getElementById("public-booking-purpose").value = "";
            showAlert(
              "public-booking-alert",
              "success",
              "Rezervacija je sacuvana u coworking sistemu.",
            );
          } catch (err) {
            showAlert(
              "public-booking-alert",
              "error",
              err.message || "Rezervacija nije uspela.",
            );
          }
        })();
        return;
      }

      const resourceConflict = state.bookings.some((booking) =>
        booking.resourceId === resourceId &&
        booking.date === date &&
        booking.status !== "cancelled" &&
        overlaps(booking.start, booking.end, start, end)
      );
      if (resourceConflict) {
        showAlert("public-booking-alert", "error", "Izabrani termin je vec zauzet. Klikni slobodan termin u pregledu ili izaberi drugo vreme.");
        return;
      }

      state.publicBookingDate = date;
      state.bookings.push({
        id: `b-${Date.now()}`,
        userId: user?.id || null,
        resourceId,
        date,
        start,
        end,
        status: "pending",
        purpose,
        guestName,
        guestEmail,
        guestPhone,
        createdAt: todayISO()
      });
      saveState();

      const calendar = document.getElementById("public-booking-calendar");
      if (calendar) calendar.innerHTML = renderPublicBookingCalendar(resourceId, date);
      document.getElementById("public-booking-purpose").value = "";
      showAlert("public-booking-alert", "success", "Rezervacija je poslata i oznacena kao zahtev na cekanju. Administrator je moze potvrditi u admin panelu.");
    }

    function submitBooking() {
      const user = currentUser();
      const date = document.getElementById("booking-date").value;
      const start = document.getElementById("booking-start").value;
      const end = document.getElementById("booking-end").value;
      const purpose = document.getElementById("booking-purpose").value.trim() || "Rezervacija prostora";
      const resourceId = state.selectedResourceId;

      if (!resourceId || !date || !start || !end) {
        showAlert("booking-alert", "error", "Izaberite resurs, datum, pocetak i kraj termina.");
        return;
      }
      if (timeToMinutes(end) <= timeToMinutes(start)) {
        showAlert("booking-alert", "error", "Kraj termina mora biti kasnije od pocetka.");
        return;
      }
      if ((timeToMinutes(end) - timeToMinutes(start)) < 30 || timeToMinutes(start) % 30 !== 0 || timeToMinutes(end) % 30 !== 0) {
        showAlert("booking-alert", "error", "Termin mora trajati najmanje 30 minuta i pocinjati/zavrsavati se u koracima od 30 minuta.");
        return;
      }
      if (USE_BACKEND) {
        (async () => {
          try {
            await mergeRoomAvailabilityIntoState(resourceId, date);
            const roomConflict = state.bookings.some((booking) =>
              booking.resourceId === resourceId &&
              booking.date === date &&
              booking.status !== "cancelled" &&
              overlaps(booking.start, booking.end, start, end)
            );
            if (roomConflict) {
              showAlert(
                "booking-alert",
                "error",
                "Izabrani resurs je vec zauzet u tom terminu. Probajte drugo vreme ili drugi resurs.",
              );
              return;
            }
            const userConflict = state.bookings.some((booking) =>
              booking.userId === user.id &&
              booking.date === date &&
              booking.status !== "cancelled" &&
              overlaps(booking.start, booking.end, start, end)
            );
            if (userConflict) {
              showAlert(
                "booking-alert",
                "error",
                "Vec imate rezervaciju u tom terminu. Izaberite vreme koje se ne preklapa.",
              );
              return;
            }
            const dailyCount = state.bookings.filter(
              (booking) =>
                booking.userId === user.id &&
                booking.date === date &&
                booking.status !== "cancelled",
            ).length;
            if (dailyCount >= 3) {
              showAlert(
                "booking-alert",
                "error",
                "Maksimalno su dozvoljene 3 aktivne rezervacije po danu.",
              );
              return;
            }
            await apiFetch("/bookings", {
              method: "POST",
              body: JSON.stringify({
                roomId: resourceId,
                date,
                startTime: start,
                endTime: end,
              }),
            });
            await refreshBookings();
            saveState();
            render();
            showAlert(
              "booking-alert",
              "success",
              "Rezervacija je sacuvana u sistemu.",
            );
          } catch (err) {
            showAlert(
              "booking-alert",
              "error",
              err.message || "Rezervacija nije uspela.",
            );
          }
        })();
        return;
      }
      const roomConflict = state.bookings.some((booking) =>
        booking.resourceId === resourceId &&
        booking.date === date &&
        booking.status !== "cancelled" &&
        overlaps(booking.start, booking.end, start, end)
      );
      if (roomConflict) {
        showAlert("booking-alert", "error", "Izabrani resurs je vec zauzet u tom terminu. Probajte drugo vreme ili drugi resurs.");
        return;
      }
      const userConflict = state.bookings.some((booking) =>
        booking.userId === user.id &&
        booking.date === date &&
        booking.status !== "cancelled" &&
        overlaps(booking.start, booking.end, start, end)
      );
      if (userConflict) {
        showAlert("booking-alert", "error", "Vec imate rezervaciju u tom terminu. Izaberite vreme koje se ne preklapa.");
        return;
      }
      const dailyCount = state.bookings.filter((booking) => booking.userId === user.id && booking.date === date && booking.status !== "cancelled").length;
      if (dailyCount >= 3) {
        showAlert("booking-alert", "error", "Maksimalno su dozvoljene 3 aktivne rezervacije po danu.");
        return;
      }
      state.bookings.push({
        id: `b-${Date.now()}`,
        userId: user.id,
        resourceId,
        date,
        start,
        end,
        status: "confirmed",
        purpose,
        createdAt: todayISO()
      });
      saveState();
      render();
    }

    async function createOrder(serviceId) {
      const user = currentUser();
      if (!user) {
        focusLogin();
        return;
      }
      const service = serviceById(serviceId);
      if (!service) return;
      if (USE_BACKEND && service.productUuid) {
        try {
          const res = await apiFetch("/commerce/orders/checkout", {
            method: "POST",
            body: JSON.stringify({
              lines: [{ productId: service.productUuid, quantity: 1 }],
            }),
          });
          if (res.url) {
            window.location.href = res.url;
            return;
          }
          await refreshOrders();
          const ord = state.orders.find((o) => o.id === res.orderId);
          state.view = user.role === "ADMIN" ? "admin-orders" : "orders";
          state.checkout = ord ? { orderId: ord.id, error: "" } : null;
          saveState();
          render();
        } catch (err) {
          showAlert("auth-alert", "error", err.message || "Checkout nije uspeo.");
        }
        return;
      }
      const order = {
        id: `o-${Date.now()}`,
        userId: user.id,
        serviceId,
        amount: service.price,
        status: "pending",
        createdAt: todayISO(),
        paymentRef: "cs_test_pending",
        stripeSessionId: `cs_test_${Date.now()}`,
        paymentMode: "test"
      };
      state.orders.unshift(order);
      if (["hot-desk", "dedicated-desk", "ten-days", "daily-pass"].includes(serviceId)) {
        const target = state.users.find((item) => item.id === user.id);
        if (target) target.packageId = serviceId;
      }
      state.view = user.role === "ADMIN" ? "admin-orders" : "orders";
      state.checkout = { orderId: order.id, error: "" };
      saveState();
      render();
    }

    function openCheckout(orderId) {
      const order = state.orders.find((item) => item.id === orderId);
      if (!order) return;
      state.checkout = { orderId, error: "" };
      saveState();
      render();
    }

    function closeCheckout() {
      state.checkout = null;
      saveState();
      render();
    }

    function submitStripeTestPayment() {
      const checkout = state.checkout;
      const order = checkout?.orderId ? state.orders.find((item) => item.id === checkout.orderId) : null;
      if (!order) {
        state.checkout = null;
        saveState();
        render();
        return;
      }
      if (order.status === "paid") {
        closeCheckout();
        return;
      }
      const cardNumber = document.getElementById("checkout-card")?.value.replace(/\D/g, "") || "";
      const expiry = document.getElementById("checkout-expiry")?.value.trim() || "";
      const cvc = document.getElementById("checkout-cvc")?.value.replace(/\D/g, "") || "";
      if (USE_BACKEND && order.id && order.id.length > 20) {
        if (cardNumber !== "4242424242424242") {
          state.checkout = {
            orderId: order.id,
            error: "Za testno placanje koristi Stripe test karticu 4242 4242 4242 4242.",
          };
          saveState();
          render();
          return;
        }
        if (!/^\d{2}\/\d{2}$/.test(expiry) || cvc.length < 3) {
          state.checkout = {
            orderId: order.id,
            error: "Unesi test datum u formatu 12/34 i CVC od najmanje 3 cifre.",
          };
          saveState();
          render();
          return;
        }
        (async () => {
          try {
            await apiFetch("/commerce/orders/demo-pay", {
              method: "POST",
              body: JSON.stringify({ orderId: order.id }),
            });
            await refreshOrders();
            await refreshAdminTransactions();
            state.checkout = null;
            state.view =
              currentUser()?.role === "ADMIN" ? "admin-orders" : "orders";
            saveState();
            render();
          } catch (err) {
            state.checkout = {
              orderId: order.id,
              error: err.message || "Placanje nije izvrseno.",
            };
            saveState();
            render();
          }
        })();
        return;
      }
      if (cardNumber !== "4242424242424242") {
        state.checkout = { orderId: order.id, error: "Za testno placanje koristi Stripe test karticu 4242 4242 4242 4242." };
        saveState();
        render();
        return;
      }
      if (!/^\d{2}\/\d{2}$/.test(expiry) || cvc.length < 3) {
        state.checkout = { orderId: order.id, error: "Unesi test datum u formatu 12/34 i CVC od najmanje 3 cifre." };
        saveState();
        render();
        return;
      }
      registerPayment(order, "stripe_test_checkout");
      state.checkout = null;
      state.view = currentUser()?.role === "ADMIN" ? "admin-orders" : "orders";
      saveState();
      render();
    }

    function registerPayment(order, source = "stripe_test_checkout") {
      const timestamp = new Date().toISOString();
      const reference = `pi_test_${Date.now()}`;
      const payment = {
        id: `pay-${Date.now()}`,
        orderId: order.id,
        userId: order.userId,
        serviceId: order.serviceId,
        amount: order.amount,
        status: "succeeded",
        provider: "Stripe test",
        reference,
        sessionId: order.stripeSessionId || `cs_test_${Date.now()}`,
        cardLast4: "4242",
        createdAt: timestamp,
        source
      };
      state.payments = [payment, ...(state.payments || []).filter((item) => item.orderId !== order.id)];
      order.status = "paid";
      order.paymentRef = reference;
      order.paidAt = timestamp;
      order.cardLast4 = "4242";
      order.paymentMode = "test";
    }

    function cancelBooking(id) {
      if (USE_BACKEND && id && id.length > 20) {
        (async () => {
          try {
            await apiFetch(`/bookings/${id}`, { method: "DELETE" });
            await refreshBookings();
            saveState();
            render();
          } catch (err) {
            alert(err.message || "Otkazivanje nije uspelo.");
          }
        })();
        return;
      }
      const booking = state.bookings.find((item) => item.id === id);
      if (booking) booking.status = "cancelled";
      saveState();
      render();
    }

    function confirmBooking(id) {
      const booking = state.bookings.find((item) => item.id === id);
      if (booking) booking.status = "confirmed";
      saveState();
      render();
    }

    function markOrderPaid(id) {
      const order = state.orders.find((item) => item.id === id);
      if (order) {
        registerPayment(order, "admin_test_confirmation");
      }
      saveState();
      render();
    }

    function toggleUserStatus(id) {
      const user = state.users.find((item) => item.id === id);
      if (user && user.role === "USER") user.status = user.status === "active" ? "cancelled" : "active";
      saveState();
      render();
    }

    function submitVoRequest() {
      const user = currentUser();
      const company = document.getElementById("vo-company").value.trim();
      const legalForm = document.getElementById("vo-form-type").value;
      if (!company) {
        showAlert("vo-alert", "error", "Unesite naziv firme ili radnje da bi zahtev mogao da se obradi.");
        return;
      }
      state.voRequests.unshift({
        id: `vo-${Date.now()}`,
        userId: user.id,
        company,
        legalForm,
        status: "lead / paid pending",
        createdAt: todayISO()
      });
      const serviceId = legalForm === "DOO" ? "virtual-office-doo" : "virtual-office-pr";
      const service = serviceById(serviceId);
      state.orders.unshift({
        id: `o-${Date.now()}`,
        userId: user.id,
        serviceId,
        amount: service.price * 3,
        status: "pending",
        createdAt: todayISO(),
        paymentRef: "vo_minimum_3_months"
      });
      saveState();
      render();
    }

    function setVoStatus(id, status) {
      const request = state.voRequests.find((item) => item.id === id);
      if (request) request.status = status;
      saveState();
      render();
    }

    window.setAuthMode = setAuthMode;
    window.openAuthModal = openAuthModal;
    window.closeAuthModal = closeAuthModal;
    window.quickLogin = quickLogin;
    window.logout = logout;
    window.navigate = navigate;
    window.navigateHome = navigateHome;
    window.focusLogin = focusLogin;
    window.scrollToPricing = scrollToPricing;
    window.scrollToHomeStats = scrollToHomeStats;
    window.movePackages = movePackages;
    window.selectGalleryImage = selectGalleryImage;
    window.setView = setView;
    window.selectResource = selectResource;
    window.createOrder = createOrder;
    window.cancelBooking = cancelBooking;
    window.confirmBooking = confirmBooking;
    window.markOrderPaid = markOrderPaid;
    window.toggleUserStatus = toggleUserStatus;
    window.setVoStatus = setVoStatus;
    window.resetDemo = resetDemo;

    (async function portalBootstrap() {
      const params = new URLSearchParams(window.location.search);
      const pageParam = params.get("page");
      if (pageParam && publicNavItems.some((item) => item.id === pageParam)) {
        state.publicPage = pageParam;
        state.showPublic = true;
        state.showAuthModal = false;
      }
      if (params.get("shot") === "admin") {
        const admin = state.users.find((item) => item.role === "ADMIN");
        if (admin) {
          state.sessionUserId = admin.id;
          state.view = "admin-overview";
          state.showPublic = false;
          state.showAuthModal = false;
        }
      }
      backendJwt = loadJwtFromStorage();
      if (USE_BACKEND && backendJwt) {
        try {
          if (!currentUser()) await ensureProfileFromBackend();
          await syncAfterLogin();
          saveState();
        } catch (e) {
          console.warn(e);
        }
      }
      if (USE_BACKEND && params.get("checkout") === "success") {
        try {
          await refreshOrders();
          await refreshAdminTransactions();
          saveState();
        } catch (e) {
          console.warn(e);
        }
      }
      render();
    })();
  </script>
</body>
