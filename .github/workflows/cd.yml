# ============================================
# CD PIPELINE - Kontinuirana Isporuka (Continuous Delivery)
# ============================================
# Ovaj workflow se pokrece kada se kod merge-uje u main granu.
# Zadaci:
#   1. Pokrece testove (ponovo, za sigurnost)
#   2. Pravi Docker slike sa tagom "latest"
#   3. Verifikuje da se svi servisi mogu pokrenuti zajedno
#
# U pravom produkcijskom okruzenju, ovde bi se dodao deploy
# na cloud platformu (AWS, Azure, GCP). Mi koristimo lokalni Docker.

name: CD Pipeline

# Pokrece se SAMO na push u main granu (tj. kada se PR merge-uje)
on:
  push:
    branches: [main]

jobs:
  # ============================================
  # JOB 1: Pokretanje testova pre deploy-a
  # ============================================
  test:
    name: Pre-deploy testovi
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - room-service
          - booking-service
          - notification-service

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalacija zavisnosti
        working-directory: ${{ matrix.service }}
        run: npm install

      - name: Pokretanje testova
        working-directory: ${{ matrix.service }}
        run: npx jest --passWithNoTests

  # ============================================
  # JOB 2: Pravljenje i tagovanje Docker slika
  # ============================================
  build-and-tag:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        service:
          - api-gateway
          - user-service
          - room-service
          - booking-service
          - notification-service

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      # Pravimo Docker sliku sa dva taga:
      # 1. "latest" - uvek pokazuje na poslednju verziju
      # 2. SHA commit hash - za tacnu identifikaciju verzije
      - name: Build i tagovanje Docker slike
        run: |
          docker build \
            -t coworking-${{ matrix.service }}:latest \
            -t coworking-${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.service }}/Dockerfile \
            ${{ matrix.service }}

      # Ispisujemo informacije o kreiranoj slici
      - name: Prikaz informacija o slici
        run: docker images coworking-${{ matrix.service }}

  # ============================================
  # JOB 3: Verifikacija Docker Compose
  # ============================================
  verify-compose:
    name: Verify Docker Compose
    runs-on: ubuntu-latest
    needs: build-and-tag

    steps:
      - name: Checkout koda
        uses: actions/checkout@v4

      # Proveravamo da li je docker-compose.yml sintaksno ispravan
      # "config" komanda parsira fajl i prijavljuje greske
      - name: Validacija docker-compose.yml
        run: docker compose config

      # Pravimo sve slike definisane u docker-compose.yml
      - name: Build svih servisa
        run: docker compose build

      # Pokrecemo sve servise u pozadini (-d = detached mode)
      - name: Pokretanje svih servisa
        run: docker compose up -d

      # Cekamo da se servisi podignu (30 sekundi)
      - name: Cekanje na pokretanje servisa
        run: sleep 30

      # Proveravamo da li su svi kontejneri aktivni
      - name: Provera statusa kontejnera
        run: docker compose ps

      # Proveravamo health endpoint API Gateway-a
      # Ako vrati status 200, znaci da je sve u redu
      - name: Health check API Gateway
        run: |
          curl -f http://localhost:3000/health || echo "Gateway not ready yet"

      # Zaustavljamo sve servise i cistimo resurse
      - name: Zaustavljanje servisa
        if: always()
        run: docker compose down -v
